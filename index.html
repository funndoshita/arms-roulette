<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>ARMS Roulette Pro</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffde00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--yellow:#ffde00;--red:#ff2d2d;--black:#0a0a0a;--white:#f5f5f5;--gray:#1a1a1a;--gray2:#2a2a2a;--gray3:#3a3a3a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--black);color:var(--white);min-height:100vh;overflow-x:hidden}

/* HEADER */
.header{background:var(--yellow);padding:14px 16px 12px;text-align:center;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(0,0,0,.06) 8px,rgba(0,0,0,.06) 16px)}
.header h1{font-family:'Black Ops One',cursive;font-size:1.6rem;color:var(--black);letter-spacing:.05em;position:relative;text-shadow:2px 2px 0 rgba(255,255,255,.3)}
.header p{font-size:.65rem;color:var(--black);opacity:.7;font-weight:700;letter-spacing:.1em;text-transform:uppercase;position:relative;margin-top:2px}

/* LAYOUT */
.main{padding:12px 14px;display:flex;flex-direction:column;gap:10px;max-width:440px;margin:0 auto}

/* PANEL */
.panel{background:var(--gray);border-radius:12px;border:1px solid var(--gray3);overflow:hidden}
.panel-head{background:var(--gray2);padding:9px 14px;font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--yellow);font-family:'Black Ops One',cursive;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray3);cursor:pointer;user-select:none}
.panel-head-left{display:flex;align-items:center;gap:6px}
.panel-head .dot{width:6px;height:6px;border-radius:50%;background:var(--yellow)}
.panel-head-arrow{font-size:.6rem;color:#666;transition:transform .25s}
.panel-head.open .panel-head-arrow{transform:rotate(180deg)}
.panel-body{padding:12px 14px}
.panel-collapse{overflow:hidden;max-height:0;transition:max-height .35s ease}
.panel-collapse.open{max-height:9999px}

/* TOGGLE */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0}
.toggle-row+.toggle-row{border-top:1px solid var(--gray3)}
.toggle-label{font-size:.78rem;font-weight:700;color:var(--white)}
.toggle-label small{display:block;font-size:.62rem;color:#888;font-weight:400;margin-top:1px}
.switch{position:relative;width:42px;height:24px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:var(--gray3);border-radius:24px;cursor:pointer;transition:.25s}
.slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#888;border-radius:50%;transition:.25s}
.switch input:checked+.slider{background:var(--yellow)}
.switch input:checked+.slider::before{transform:translateX(18px);background:var(--black)}

/* 3P MODE */
#name-section{display:none;border-top:1px solid var(--gray3);padding-top:10px;margin-top:4px;padding-bottom:2px}
.name-toggle-btn{width:100%;background:transparent;border:1px dashed #444;border-radius:8px;color:#888;font-size:.72rem;font-weight:700;padding:7px 12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px;transition:.15s}
.name-toggle-btn:hover{border-color:#666;color:#aaa}
.ntarrow{transition:transform .2s;display:inline-block}
.name-toggle-btn.open .ntarrow{transform:rotate(180deg)}
.name-collapse{overflow:hidden;max-height:0;transition:max-height .3s ease}
.name-collapse.open{max-height:220px}
.name-row{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.name-inp-wrap{display:flex;align-items:center;gap:8px}
.name-inp-label{font-size:.68rem;font-weight:700;color:#888;width:22px;flex-shrink:0;text-align:right}
.name-inp{flex:1;background:var(--gray3);border:1px solid #444;color:var(--white);padding:9px 12px;border-radius:8px;font-size:.85rem;outline:none;font-family:'Noto Sans JP',sans-serif}
.name-inp:focus{border-color:var(--yellow)}
.name-inp::placeholder{color:#555}
.match-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:4px}
.match-btn{background:var(--gray3);color:#999;border:2px solid #444;padding:10px 4px;border-radius:8px;font-size:.75rem;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:.15s;font-family:'Noto Sans JP',sans-serif}
.match-btn:active{transform:scale(.97)}
.match-btn.active{background:var(--yellow);color:var(--black);border-color:var(--yellow)}
.match-btn .vs{font-size:.52rem;opacity:.6}

/* EXCLUDE */
.exc-collapsible-head{display:flex;align-items:center;justify-content:space-between;padding:9px 0;cursor:pointer;user-select:none;border-top:1px solid var(--gray3);margin-top:6px}
.exc-head-label{font-size:.75rem;font-weight:700;color:#aaa}
.exc-arrow{font-size:.65rem;color:#666;transition:.2s}
.exc-collapsible-head.open .exc-arrow{transform:rotate(180deg)}
.exc-body{overflow:hidden;max-height:0;transition:max-height .35s ease}
.exc-body.open{max-height:600px}
.exc-tabs{display:flex;gap:4px;margin-bottom:10px}
.exc-tab{flex:1;padding:7px;background:var(--gray3);color:#888;border:none;border-radius:6px;font-size:.72rem;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:.15s}
.exc-tab.active{background:var(--yellow);color:var(--black)}
/* 属性除外ボタン群 */
.attr-exc-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--gray3)}
.attr-exc-btn{background:var(--gray3);color:#888;border:1.5px solid transparent;padding:5px 8px;border-radius:6px;font-size:.7rem;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:.15s;display:flex;align-items:center;gap:3px}
.attr-exc-btn.active{color:#fff;border-color:currentColor}
.exc-list{display:grid;grid-template-columns:1fr 1fr;gap:5px;max-height:210px;overflow-y:auto}
.exc-item{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--gray3);border-radius:6px;cursor:pointer;border:1.5px solid transparent;transition:.15s;font-size:.72rem;user-select:none}
.exc-item.excluded{border-color:var(--red);background:#2a0a0a;color:#ff6666}
.exc-item .exc-check{width:14px;height:14px;border-radius:3px;border:1.5px solid #555;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.6rem;transition:.15s}
.exc-item.excluded .exc-check{background:var(--red);border-color:var(--red);color:#fff}
.exc-clear{width:100%;margin-top:8px;padding:7px;background:transparent;color:#888;border:1px solid #444;border-radius:6px;font-size:.72rem;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:.15s}
.exc-clear:hover{color:var(--red);border-color:var(--red)}

/* 属性表示モード切り替えボタン */
.attr-mode-wrap{display:flex;gap:0;margin-top:4px;border-radius:7px;overflow:hidden;border:1px solid #444}
.attr-mode-btn{flex:1;padding:7px 4px;background:var(--gray3);color:#888;border:none;font-size:.68rem;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:.15s;border-right:1px solid #444}
.attr-mode-btn:last-child{border-right:none}
.attr-mode-btn.active{background:var(--yellow);color:var(--black)}

/* 属性文字色 */
.arm-name.attr-fire{color:#ff4444}
.arm-name.attr-ice{color:#44ccff}
.arm-name.attr-blind{color:#888888}
.arm-name.attr-none{color:#f5f5f5}
.arm-name.attr-wind{color:#44dd88}
.arm-name.attr-explosion{color:#ff8800}
.arm-name.attr-thunder{color:#4488ff}
.arm-name.attr-shock{color:#ffdd00}
.arm-name.attr-poison{color:#aa44ff}

/* RESULT GRID */
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.p-card{background:var(--gray);border:1px solid var(--gray3);border-radius:14px;overflow:hidden;min-height:220px}
.p-card-head{background:var(--gray2);padding:9px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray3)}
.p-name{font-size:.78rem;font-weight:700;color:var(--yellow);outline:none;min-width:20px;max-width:100px;white-space:nowrap;overflow:hidden}
.p-edit{font-size:.7rem;cursor:pointer;opacity:.7}
.p-body{padding:10px 12px}
.char-name{font-size:.85rem;font-weight:900;color:var(--yellow);display:block;margin-bottom:8px;border-bottom:1px solid var(--gray3);padding-bottom:6px;font-family:'Black Ops One',cursive;letter-spacing:.02em}
.arm-item{padding:5px 0;border-bottom:1px dotted var(--gray3)}
.arm-item:last-child{border-bottom:none}
.arm-coord{font-size:1.2rem;font-weight:900;color:var(--white);font-family:'Black Ops One',cursive;line-height:1}
.arm-name{font-size:.72rem;color:var(--yellow);font-weight:700;margin-top:2px;display:block}
.special-label{display:inline-block;background:var(--red);color:#fff;font-size:.62rem;font-weight:700;letter-spacing:.1em;padding:3px 8px;border-radius:4px;margin-bottom:8px;font-family:'Black Ops One',cursive}

/* BUTTONS */
.btn-draw{width:100%;padding:18px;background:var(--yellow);color:var(--black);border:none;border-radius:12px;font-family:'Black Ops One',cursive;font-size:1.8rem;letter-spacing:.4em;cursor:pointer;position:relative;overflow:hidden;transition:.15s;box-shadow:0 4px 0 #b8a000,0 6px 20px rgba(255,222,0,.2)}
.btn-draw:active{transform:translateY(3px);box-shadow:0 1px 0 #b8a000}
.btn-draw::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 50%)}
.btn-draw:disabled{opacity:.5;pointer-events:none}
.btn-copy{width:100%;padding:13px;background:transparent;color:var(--white);border:1.5px solid var(--gray3);border-radius:10px;font-size:.85rem;font-weight:700;cursor:pointer;transition:.15s;font-family:'Noto Sans JP',sans-serif}
.btn-copy:hover{border-color:#555;background:var(--gray2)}
.btn-copy:active{transform:scale(.98)}
.btn-save{width:100%;padding:13px;background:var(--gray2);color:var(--white);border:1.5px solid var(--gray3);border-radius:10px;font-size:.85rem;font-weight:700;cursor:pointer;transition:.15s;font-family:'Noto Sans JP',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-save:hover{border-color:#555;background:var(--gray3)}
.btn-save:active{transform:scale(.98)}
#msg{text-align:center;font-size:.75rem;font-weight:700;height:1.2rem;color:var(--yellow);transition:opacity .3s}

/* RESULT ANIMATIONS */
@keyframes revealSlide{0%{opacity:0;transform:translateY(10px) scale(.95)}60%{transform:translateY(-2px) scale(1.01)}100%{opacity:1;transform:none}}
@keyframes charReveal{0%{letter-spacing:.3em;opacity:0;transform:scale(1.08)}100%{letter-spacing:.02em;opacity:1;transform:scale(1)}}
@keyframes borderGlow{0%,100%{border-color:var(--gray3);box-shadow:none}50%{border-color:var(--yellow);box-shadow:0 0 16px rgba(255,222,0,.25)}}
.arm-item.reveal{animation:revealSlide .38s cubic-bezier(.22,1,.36,1) both}
.char-name.reveal{animation:charReveal .35s cubic-bezier(.22,1,.36,1) both}
.p-card.glow{animation:borderGlow .6s ease 3}

/* INFO */
details{background:var(--gray);border:1px solid var(--gray3);border-radius:12px;overflow:hidden}
summary{padding:11px 14px;cursor:pointer;font-size:.75rem;font-weight:700;color:#888;list-style:none;display:flex;justify-content:space-between;align-items:center}
summary::after{content:'▼';font-size:.6rem}
details[open] summary::after{content:'▲'}
.info-body{padding:12px 14px;border-top:1px solid var(--gray3);font-size:.72rem;line-height:1.7;color:#aaa}
.info-body b{color:var(--yellow);display:block;margin:8px 0 3px}

/* PWA */
#pwa-banner{display:none;background:var(--gray2);border:1px solid var(--gray3);border-radius:10px;padding:10px 14px;flex-direction:row;align-items:center;justify-content:space-between;gap:8px}
#pwa-banner span{font-size:.72rem;color:#ccc;flex:1}
#pwa-install{background:var(--yellow);color:var(--black);border:none;border-radius:6px;padding:7px 12px;font-size:.72rem;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;flex-shrink:0}
#shareCanvas{display:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--gray2)}
::-webkit-scrollbar-thumb{background:#444;border-radius:4px}

/* ══════════════════════════════════
   SLOT OVERLAY — 全画面本格スロット
══════════════════════════════════ */
#slot-overlay{
  position:fixed;inset:0;z-index:200;
  background:#050505;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;
}
#slot-overlay.active{display:flex}

/* 背景グリッドライン */
#slot-overlay::before{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(rgba(255,222,0,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,222,0,.04) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;
}
/* 上部グロー（常に画面上部固定） */
#slot-overlay::after{
  content:'';position:absolute;top:0;left:0;right:0;height:40%;
  background:linear-gradient(180deg,rgba(30,20,0,.9) 0%,transparent 100%);
  pointer-events:none;z-index:0;
}

/* パーティクル */
#particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:10}
@keyframes particleFall{0%{transform:translateY(-30px) rotate(0deg) scale(1);opacity:1}100%{transform:translateY(110vh) rotate(900deg) scale(.3);opacity:0}}
.particle{position:absolute;top:0;animation:particleFall linear both}

/* ── フェーズ共通ラッパー ── */
.slot-phase{
  position:absolute;inset:0;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:0;
  z-index:1;
}
.slot-phase.active{display:flex}

/* ── Phase 0: アナウンス ── */
#phase-announce{gap:12px}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
.announce-label{
  font-family:'Black Ops One',cursive;font-size:.75rem;letter-spacing:.3em;
  color:#555;text-transform:uppercase;
}
@keyframes announceIn{0%{opacity:0;transform:scale(.6) translateY(16px)}60%{transform:scale(1.04)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes announceOut{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.15) translateY(-12px)}}
.announce-name{
  font-family:'Black Ops One',cursive;font-size:2.4rem;
  background:linear-gradient(135deg,#ffde00,#fff8a0,#ffde00);
  background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 1.5s linear infinite;
  letter-spacing:.04em;text-align:center;line-height:1.1;
  max-width:90vw;word-break:break-all;
}
.announce-sub{
  font-family:'Black Ops One',cursive;font-size:1rem;
  color:var(--red);letter-spacing:.22em;
  text-shadow:0 0 20px rgba(255,45,45,.6);
}
.announce-in{animation:announceIn .45s cubic-bezier(.22,1,.36,1) both}
.announce-out{animation:announceOut .3s ease both}

/* START スプラッシュ */
@keyframes startSplash{
  0%{opacity:0;transform:scale(2.2) rotate(-4deg)}
  25%{opacity:1;transform:scale(.92) rotate(1deg)}
  65%{transform:scale(1) rotate(0deg);opacity:1}
  100%{opacity:0;transform:scale(1.1)}
}
#start-splash{
  position:absolute;inset:0;z-index:30;
  display:none;align-items:center;justify-content:center;
  pointer-events:none;
}
#start-splash.show{display:flex}
.start-splash-text{
  font-family:'Black Ops One',cursive;font-size:5.5rem;
  color:var(--red);
  text-shadow:0 0 50px rgba(255,45,45,.9),0 0 100px rgba(255,45,45,.4);
  letter-spacing:.12em;
  animation:startSplash .9s cubic-bezier(.22,1,.36,1) both;
}

/* ── Phase 1: カウントダウン ── */
#phase-cd{gap:0}
#cd-wrap{position:relative;height:140px;width:140px;display:flex;align-items:center;justify-content:center}
@keyframes cdPop{0%{transform:scale(2.6);opacity:0}22%{transform:scale(.85);opacity:1}65%{transform:scale(1);opacity:1}100%{transform:scale(.3);opacity:0}}
.cd-num{
  font-family:'Black Ops One',cursive;font-size:8rem;color:var(--yellow);
  text-shadow:0 0 50px rgba(255,222,0,.9),0 0 100px rgba(255,222,0,.4);
  animation:cdPop .88s cubic-bezier(.22,1,.36,1) both;
  position:absolute;line-height:1;
}
.cd-ring{
  position:absolute;inset:-10px;border-radius:50%;
  border:2px solid rgba(255,222,0,.15);
  animation:cdPop .88s cubic-bezier(.22,1,.36,1) both;
}

/* ── Phase 2: スロットマシン ── */
#phase-slot{width:100%;justify-content:center;padding:0}

/* プレイヤーヘッダー */
.slot-player-header{
  width:100%;padding:14px 20px 10px;
  display:flex;align-items:center;justify-content:center;gap:10px;
  flex-shrink:0;
}
.slot-player-name{
  font-family:'Black Ops One',cursive;font-size:1.3rem;color:var(--yellow);
  letter-spacing:.06em;text-shadow:0 0 20px rgba(255,222,0,.4);
}
.slot-player-badge{
  font-family:'Black Ops One',cursive;font-size:.6rem;letter-spacing:.15em;
  color:#555;border:1px solid #333;padding:3px 8px;border-radius:3px;
}

/* スロット筐体 */
.slot-machine{
  width:92%;max-width:360px;
  background:linear-gradient(180deg,#1a1a1a 0%,#111 100%);
  border:2px solid #333;border-radius:16px;
  overflow:hidden;flex-shrink:0;
  box-shadow:0 0 40px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.05);
}

/* キャラ表示エリア */
.slot-char-section{
  background:#0d0d0d;padding:10px 16px 8px;
  border-bottom:1px solid #222;
  display:flex;align-items:center;gap:10px;
}
.slot-char-label{font-size:.6rem;font-weight:700;letter-spacing:.15em;color:#444;flex-shrink:0;text-transform:uppercase;font-family:'Black Ops One',cursive}
.slot-char-window{flex:1;height:30px;overflow:hidden;position:relative}
/* 上下グラデーションマスク */
.slot-char-window::before,.slot-char-window::after{
  content:'';position:absolute;left:0;right:0;height:8px;z-index:2;pointer-events:none;
}
.slot-char-window::before{top:0;background:linear-gradient(#0d0d0d,transparent)}
.slot-char-window::after{bottom:0;background:linear-gradient(transparent,#0d0d0d)}
.slot-char-drum{display:flex;flex-direction:column;will-change:transform}
.slot-char-item{
  height:30px;display:flex;align-items:center;
  font-family:'Black Ops One',cursive;font-size:.92rem;
  color:var(--yellow);white-space:nowrap;letter-spacing:.02em;
}
@keyframes charConfirm{
  0%{color:var(--yellow);text-shadow:none}
  30%{color:#fff;text-shadow:0 0 24px rgba(255,255,255,.9),0 0 8px rgba(255,222,0,.8)}
  100%{color:var(--yellow);text-shadow:none}
}
.slot-char-item.confirmed{animation:charConfirm .7s ease both}

/* リール群 */
.slot-reels-wrap{padding:14px 14px 10px;display:flex;flex-direction:column;gap:8px}
.reel-row{display:flex;align-items:center;gap:8px}
.reel-num{
  font-family:'Black Ops One',cursive;font-size:.7rem;color:#333;
  width:16px;text-align:center;flex-shrink:0;
}
/* リール本体 */
.reel-body{
  flex:1;height:52px;
  background:#080808;border:1px solid #2a2a2a;border-radius:8px;
  overflow:hidden;position:relative;
}
/* センターライン（当たり判定ライン風） */
.reel-body::before,.reel-body::after{
  content:'';position:absolute;left:0;right:0;z-index:3;pointer-events:none;
}
.reel-body::before{
  top:0;height:16px;
  background:linear-gradient(#080808,transparent);
}
.reel-body::after{
  bottom:0;height:16px;
  background:linear-gradient(transparent,#080808);
}
/* ハイライトライン */
.reel-highlight{
  position:absolute;top:50%;transform:translateY(-50%);
  left:0;right:0;height:52px;pointer-events:none;z-index:1;
  border-top:1px solid rgba(255,222,0,.12);
  border-bottom:1px solid rgba(255,222,0,.12);
  background:rgba(255,222,0,.02);
}
.reel-track{display:flex;flex-direction:column;will-change:transform;position:relative;z-index:2}
.reel-item{
  height:52px;display:flex;flex-direction:row;align-items:center;gap:8px;
  padding:0 10px;
}
.reel-coord{
  font-family:'Black Ops One',cursive;font-size:.82rem;color:#666;
  line-height:1;letter-spacing:.04em;flex-shrink:0;min-width:28px;
}
.reel-name{
  font-size:
